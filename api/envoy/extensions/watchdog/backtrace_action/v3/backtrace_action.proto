syntax = "proto3";

package envoy.extensions.watchdog.backtrace_action.v3;

import "google/protobuf/duration.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.watchdog.backtrace_action.v3";
option java_outer_classname = "BacktraceActionProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/watchdog/backtrace_action/v3;backtrave_actionv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Watchdog Action that logs backtraces.]
// [#extension: envoy.watchdog.backtrace_action]

// Configuration for the backtrace watchdog action.
message BacktraceActionConfig {
  // Minimum time between backtrace logs. Defaults to 10 seconds if not set.
  google.protobuf.Duration cooldown_duration = 1;
}
